name: Deploy SKiDROSCOPE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download website package
        run: |
          curl -L --fail --retry 3 "https://drive.usercontent.google.com/download?id=1xl7lQkKm7KyydWXXuQAMhYUlkX7QyM_c&export=download&confirm=t" -o site.tar.gz
      - name: Extract website
        run: |
          mkdir public
          tar -xzf site.tar.gz -C public
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v4
